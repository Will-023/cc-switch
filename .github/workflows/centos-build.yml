name: CentOS 7 Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-centos7:
    runs-on: ubuntu-latest
    container:
      image: centos:7

    steps:
      # Fix EOL repos and install git BEFORE checkout — must use shell steps only
      # because CentOS 7 (glibc 2.17) cannot run the Node.js 20 binary that
      # GitHub Actions uses internally to execute JS-based actions like
      # actions/checkout@v4 or actions/upload-artifact@v4.
      - name: Fix CentOS 7 EOL Yum Repos and install git
        run: |
          sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*
          sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*
          yum install -y git curl wget

      - name: Checkout repository
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD

      - name: Install System Dependencies
        run: |
          yum update -y
          yum groupinstall -y "Development Tools"
          # Install devtoolset-9 for a modern GCC (9.x) — CentOS 7's default
          # GCC 4.8.5 lacks full C++14/C++17 support required by Tauri/Rust crates.
          yum install -y centos-release-scl
          # Fix the newly created SCLo repo files which still point to the dead mirrorlist
          sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-SCLo-*.repo
          sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-SCLo-*.repo
          yum install -y devtoolset-9
          yum install -y epel-release
          yum install -y \
            openssl-devel \
            webkit2gtk3-devel \
            gtk3-devel \
            libsoup-devel \
            pango-devel \
            cairo-devel \
            gdk-pixbuf2-devel \
            atk-devel \
            squashfs-tools \
            rpm-build

      - name: Install Rust Toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Node.js 20 (glibc-2.17 compatible)
        run: |
          wget https://unofficial-builds.nodejs.org/download/release/v20.18.0/node-v20.18.0-linux-x64-glibc-217.tar.gz
          tar -xzf node-v20.18.0-linux-x64-glibc-217.tar.gz -C /usr/local --strip-components=1
          echo "/usr/local/bin" >> $GITHUB_PATH
          /usr/local/bin/node -v
          /usr/local/bin/npm -v

      - name: Install pnpm
        run: |
          /usr/local/bin/npm install -g pnpm@10.12.3
          /usr/local/bin/pnpm -v

      - name: Install Frontend Dependencies
        run: /usr/local/bin/pnpm install --frozen-lockfile

      - name: Build Tauri App (AppImage & RPM)
        run: |
          # Activate devtoolset-9 to export CC/CXX/PATH with GCC 9 for this step.
          . /opt/rh/devtoolset-9/enable
          /usr/local/bin/pnpm tauri build --bundles appimage,rpm

      - name: List Build Artifacts
        run: |
          echo "=== CentOS 7 Build Artifacts ==="
          find src-tauri/target/release/bundle \( -name "*.AppImage" -o -name "*.rpm" \) 2>/dev/null || echo "No artifacts found"
